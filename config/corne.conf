# Display configuration
CONFIG_ZMK_DISPLAY=n
CONFIG_NICE_VIEW_WIDGET_WIDGET_WPM_STATUS=n

# Deep sleep
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

# Bluetooth configuration
CONFIG_ZMK_BLE=y
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y # More power, seems to be important to fix key reapeats over BT.
CONFIG_ZMK_BLE_INIT_PRIORITY=6

CONFIG_ZMK_STUDIO=y
