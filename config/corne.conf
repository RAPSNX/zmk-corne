# BT config
CONFIG_ZMK_BLE=y # Enable BT
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y # Increaste BT signal strenght

CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

CONFIG_ZMK_STUDIO=y

CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=5
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=10

CONFIG_ZMK_BATTERY_REPORTING=y

CONFIG_NICE_VIEW_WIDGET_WIDGET_WPM_STATUS=y
