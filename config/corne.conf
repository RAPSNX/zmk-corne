# Enable Bluetooth Low Energy support.
CONFIG_ZMK_BLE=y

# Keep BLE behavior conservative.
# Disabled because it can change reconnect/timing behavior on some hosts.
# CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# Enable sleep to save battery.
CONFIG_ZMK_SLEEP=y

# Sleep after 30 minutes to avoid frequent sleep/wakeup reconnect edge cases.
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

# Enable ZMK Studio support.
# Requires the studio-rpc-usb-uart snippet on the central/left half.
CONFIG_ZMK_STUDIO=y

# Keep press debounce responsive.
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=5

# Slightly safer release debounce against noisy/delayed releases.
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=10

# Report battery level to the host.
CONFIG_ZMK_BATTERY_REPORTING=y

# Invert nice!view custom widget colors.
# Use this instead of CONFIG_ZMK_DISPLAY_INVERT for nice!view.
CONFIG_NICE_VIEW_WIDGET_INVERTED=y

# This does not affect nice!view custom WPM,
# but is safe if another display widget path is used.
CONFIG_ZMK_WIDGET_WPM_STATUS=n
