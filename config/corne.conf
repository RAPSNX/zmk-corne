# Enable Bluetooth Low Energy support.
CONFIG_ZMK_BLE=y

# Use ZMK's newer BLE connection handling for better split/BLE stability.
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# Enable deep sleep when the keyboard is idle.
CONFIG_ZMK_SLEEP=y

# Sleep after 15 minutes of inactivity.
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Enable ZMK Studio support.
# Requires the studio-rpc-usb-uart snippet on the central/left half.
CONFIG_ZMK_STUDIO=y

# Conservative debounce: stable enough without adding much latency.
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=5
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5

# Report battery level to the host.
CONFIG_ZMK_BATTERY_REPORTING=y

# Disable words-per-minute widget on nice!view.
CONFIG_ZMK_WIDGET_WPM_STATUS=n
